{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alumnos</title>
    <link rel="stylesheet" href="{% static 'styles/agregar_alumnostyles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-custom">
        <div class="container-fluid"> <!-- Contenedor fluido para usar todo el ancho -->
            <!-- Logo -->
            <a class="navbar-brand p-0 me-3" href="#">
                <img src="{% static 'images/Logo.png' %}" alt="Logo" class="logo">
            </a>
            <!-- Toggler para móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Links de navegación -->
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'agregar_alumno' %}">Agregar Alumno</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Editar Alumno</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Eliminar Alumno</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Buscar Alumno</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center">Agregar Alumno</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Guardar Alumno</button>
        </form>
    </div>
</html>
